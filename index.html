<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notification Controller</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 400px; }
        button { padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Web Notifications</h2>
        <p>To receive updates from this application, please enable notification permissions.</p>
        <button onclick="requestNotificationPermission()">Enable Notifications</button>
    </div>

    <script>
        function requestNotificationPermission() {
            // Check if the browser supports notifications
            if (!("Notification" in window)) {
                alert("This browser does not support desktop notifications.");
                return;
            }

            // Request permission from the user
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    console.log("Notification permission granted.");
                    // Open the second page to manage or view alerts
                    window.open("alerts.html", "_blank");
                } else {
                    console.log("Notification permission denied.");
                }
            });
        }
    </script>

</body>
</html>
