<!DOCTYPE html>
<html>
<head>
    <title>Counter Dashboard</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; text-align: center; padding-top: 100px; }
        #total { font-size: 150px; font-weight: bold; border: 5px solid #00ff41; display: inline-block; padding: 40px; }
    </style>
</head>
<body>
    <h1>ACTIVE REPLICATORS</h1>
    <div id="total">0</div>

    <script>
        setInterval(() => {
            let active = 0;
            const now = Date.now();
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith("tab_")) {
                    // If the tab "pulsed" in the last 3 seconds, it's alive
                    if (now - parseInt(localStorage.getItem(key)) < 3000) {
                        active++;
                    } else {
                        localStorage.removeItem(key);
                    }
                }
            }
            document.getElementById('total').innerText = active;
        }, 500);
    </script>
</body>
</html>
