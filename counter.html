<!DOCTYPE html>
<html>
<head>
    <title>Live Global Tracker</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; }
        .container { border: 5px solid #00ff41; display: inline-block; padding: 40px; margin-top: 50px; }
        .num { font-size: 100px; font-weight: bold; }
        .label { font-size: 20px; color: #ff0055; }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">SESSION TOTAL</div>
        <div id="total" class="num">0</div>
        <hr style="border: 1px solid #00ff41;">
        <div class="label">ACTIVE NOW</div>
        <div id="active" class="num">0</div>
    </div>

    <script>
        setInterval(() => {
            const now = Date.now();
            let activeCount = 0;

            // 1. Count Active Tabs
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith("tab_")) {
                    const lastPulse = parseInt(localStorage.getItem(key));
                    if (now - lastPulse < 3000) {
                        activeCount++;
                    } else {
                        localStorage.removeItem(key);
                    }
                }
            }

            // 2. RESET LOGIC: If Active is 0, reset the Total to 0
            if (activeCount === 0) {
                localStorage.setItem('global_total', 0);
            }

            const totalOpened = localStorage.getItem('global_total') || 0;
            document.getElementById('total').innerText = totalOpened;
            document.getElementById('active').innerText = activeCount;
        }, 500);
    </script>
</body>
</html>
